services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nckh-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    restart: unless-stopped
    networks:
      - nckh-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nckh-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - nckh-network

networks:
  nckh-network:
    driver: bridge
